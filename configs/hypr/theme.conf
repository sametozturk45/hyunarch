# theme.conf - Renkler, Tema ve Görsel Efektler

general {
  gaps_in = 5
  gaps_out = 15
  border_size = 2
  col.active_border = rgba(64c7ffee)
  col.inactive_border = rgba(333333aa)
  layout = dwindle
}

decoration {
  rounding = 10
  blur = yes
  blur_size = 7
  blur_passes = 3
  blur_new_optimizations = on

  drop_shadow = yes
  shadow_range = 20
  shadow_render_power = 3
  col.shadow = rgba(00000044)
}

animations {
  enabled = yes
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
}
