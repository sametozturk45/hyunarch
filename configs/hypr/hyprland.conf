# hyprland.conf - Ana Hyprland Yapılandırma Dosyası

# Alt modülleri dahil et
source = ~/.config/hypr/env.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/theme.conf
source = ~/.config/hypr/plugins.conf

# Hyprland davranışlarını özelleştirmek için buraya ek parametreler eklenebilir
# Örneğin özel log seviyesi veya varsayılan çalışma alanı:
# general {
#   log_level = info
#   no_cursor_warps = true
# }

# Bu dosya sistemdeki ~/.config/hypr klasöründe yer almalı
