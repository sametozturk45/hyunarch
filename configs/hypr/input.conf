# input.conf - Giriş Aygıtları Ayarları

# Klavye
input {
  kb_layout = tr
  follow_mouse = 1
  repeat_rate = 40
  repeat_delay = 250
}

# Touchpad
device:touchpad {
  natural_scroll = true
  tap-to-click = true
  disable_while_typing = true
}

# Mouse
device:mouse {
  sensitivity = 0.5
}

# Xbox Game Controller
device:name:Xbox Wireless Controller {
  enabled = true
  left_handed = false
}

# Bluetooth Kulaklık (otomatik değil, pipewire üzerinden yönetilmeli)
# Sistem seviyesi destek: bluetooth.service, pipewire, wireplumber kurulu olmalı
# Bağlantı kalitesi ve gecikme için wireplumber.conf veya pavucontrol üzerinden yapılandırılır
