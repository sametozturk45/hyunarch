# kitty.conf

# Font ve tema
font_family      FiraCode Nerd Font
font_size        12.0
bold_font        auto
italic_font      auto

# Renk şeması
include ~/.config/kitty/themes/OneDark.conf

# Transparan arka plan
background_opacity 0.90

# Scroll ayarları
scrollback_lines 10000

# Kenarlık ve padding
window_padding_width 6

# Kopyalama
copy_on_select yes

# Wayland uyumluluğu
enable_wayland yes
